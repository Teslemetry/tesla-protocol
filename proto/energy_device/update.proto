// TESLEMETRY SOURCE-OF-RECORD - no upstream.
// Provenance: Tesla Energy gateway (TEG) local API, from our own
// observations and contributions from the community
syntax = "proto3";

package tesla.proto.energy_device.v1;

option go_package = "github.com/teslamotors/energy_device/pkg/protocol/protobuf/energydevice/v1";
option java_package = "com.tesla.generated.energy_device.v1";
option java_outer_classname = "Update";

enum UpdateStatus {
  UPDATE_STATUS_INVALID     = 0;
  UPDATE_STATUS_IDLE        = 1;
  UPDATE_STATUS_DOWNLOADING = 2;
  UPDATE_STATUS_DOWNLOADED  = 3;
  UPDATE_STATUS_STAGED      = 4;
}

enum UpdateHandshakeResult {
  UPDATE_HANDSHAKE_RESULT_INVALID        = 0;
  UPDATE_HANDSHAKE_RESULT_UNDERWAY       = 1;
  UPDATE_HANDSHAKE_RESULT_FAILED         = 2;
  UPDATE_HANDSHAKE_RESULT_NON_ACTIONABLE = 3;
  UPDATE_HANDSHAKE_RESULT_UPDATE_STAGED  = 4;
}

enum LastUpdateResult {
  LAST_UPDATE_RESULT_INVALID   = 0;
  LAST_UPDATE_RESULT_FAILED    = 1;
  LAST_UPDATE_RESULT_SUCCEEDED = 2;
}

message FirmwareVersion {
  string version = 1;
  bytes githash  = 2;
}

message ServerStagedPackage {
  string download_url                   = 1;
  uint64 package_id                     = 2;
  bytes package_signature               = 3;
  FirmwareVersion server_staged_version = 4;
}

message SystemUpdate {
  int32 handshake_result                              = 1;
  int32 update_status                                 = 2;
  FirmwareVersion server_staged_version               = 3;
  uint64 total_bytes                                  = 4;
  uint64 bytes_offset                                 = 5;
  uint64 estimated_bytes_per_second                   = 6;
  uint64 last_handshake_timestamp                     = 7;
  int32 last_update_result                            = 8;
  repeated ServerStagedPackage server_staged_packages = 9;
}

message AcceptedPackage {
  uint64 package_id       = 1;
  bytes package_signature = 2;
  string upload_endpoint  = 3;
}

message LocallyAvailablePackage {
  uint64 package_id       = 1;
  bytes package_signature = 2;
  uint64 file_size_bytes  = 3;
}
