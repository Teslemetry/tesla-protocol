// TESLEMETRY SOURCE-OF-RECORD - no upstream.
// Provenance: Tesla Energy gateway (TEG) local API, from our own
// observations and contributions from the community
syntax = "proto3";

package tesla.proto.energy_device.v1;

option go_package = "github.com/teslamotors/energy_device/pkg/protocol/protobuf/energydevice/v1";
option java_package = "com.tesla.generated.energy_device.v1";
option java_outer_classname = "AuthorizationApi";

import "google/protobuf/timestamp.proto";
import "authorization_types.proto";

message AuthorizationAPIAddAuthorizedClientRequest {
  AuthorizedClientType type               = 1;
  string description                      = 2;
  AuthorizedKeyType key_type              = 3;
  bytes public_key                        = 4;
}

message AuthorizationAPIAddAuthorizedClientResponse {
  AuthorizationRecord client = 1;
}

message AuthorizationAPIAddAuthorizedClientByTrustedSignatureRequest {
  AuthorizedClientType type        = 1;
  string description               = 2;
  AuthorizedKeyType key_type       = 3;
  bytes public_key                 = 4;
  repeated AuthorizationRole roles = 5;
  string identifier                = 6;
}

message AuthorizationAPIAddAuthorizedClientByTrustedSignatureResponse {
  AuthorizationRecord client = 1;
}

message AuthorizationAPIRemoveAuthorizedClientRequest {
  bytes public_key = 1;
}

message AuthorizationAPIRemoveAuthorizedClientResponse {
}

message AuthorizationAPIListAuthorizedClientsRequest {
}

message AuthorizationAPIListAuthorizedClientsResponse {
  repeated AuthorizationRecord clients = 1;
  bool enable_line_switch_off          = 2;
}

message AuthorizationAPIGetSignedCommandsPublicKeyRequest {
}

message AuthorizationAPIGetSignedCommandsPublicKeyResponse {
  bytes pub_key_ecc = 1;
}

message AuthorizationAPIConfigureRemoteServiceRequest {
  uint32 duration_seconds = 1;
  string session_id       = 2;
  string requester_email  = 3;
}

message AuthorizationAPIConfigureRemoteServiceResponse {
  google.protobuf.Timestamp begin_time  = 1;
  google.protobuf.Timestamp expiry_time = 2;
}

message AuthorizationMessages {
  oneof message {
    AuthorizationAPIAddAuthorizedClientRequest add_authorized_client_request                                          = 1;
    AuthorizationAPIAddAuthorizedClientResponse add_authorized_client_response                                        = 2;
    AuthorizationAPIRemoveAuthorizedClientRequest remove_authorized_client_request                                    = 3;
    AuthorizationAPIRemoveAuthorizedClientResponse remove_authorized_client_response                                  = 4;
    AuthorizationAPIListAuthorizedClientsRequest list_authorized_clients_request                                      = 5;
    AuthorizationAPIListAuthorizedClientsResponse list_authorized_clients_response                                    = 6;
    AuthorizationAPIGetSignedCommandsPublicKeyRequest get_signed_commands_public_key_request                          = 7;
    AuthorizationAPIGetSignedCommandsPublicKeyResponse get_signed_commands_public_key_response                        = 8;
    AuthorizationAPIAddAuthorizedClientByTrustedSignatureRequest add_authorized_client_by_trusted_signature_request   = 9;
    AuthorizationAPIAddAuthorizedClientByTrustedSignatureResponse add_authorized_client_by_trusted_signature_response = 10;
    AuthorizationAPIConfigureRemoteServiceRequest configure_remote_service_request                                    = 11;
    AuthorizationAPIConfigureRemoteServiceResponse configure_remote_service_response                                  = 12;
  }
}
