// TESLEMETRY SOURCE-OF-RECORD - no upstream.
// Provenance: Tesla Energy gateway (TEG) local API, from our own
// observations and contributions from the community
syntax = "proto3";

package tesla.proto.energy_device.v1;

option go_package = "github.com/teslamotors/energy_device/pkg/protocol/protobuf/energydevice/v1";
option java_package = "com.tesla.generated.energy_device.v1";
option java_outer_classname = "CommonApi";

import "networking.proto";
import "device.proto";
import "update.proto";
import "error.proto";

message CommonAPIGetSystemInfoRequest {
}

message CommonAPIGetSystemInfoResponse {
  EcuId device_id                 = 1;
  Din din                         = 2;
  FirmwareVersion firmare_version = 3;
  SystemUpdate system_update      = 4;
  DeviceType device_type          = 5;
}

message CommonAPISetLocalSiteConfigRequest {
}

message CommonAPISetLocalSiteConfigResponse {
}

message CommonAPIPerformUpdateRequest {
}

message CommonAPIPerformUpdateResponse {
}

message CommonAPIFactoryResetRequest {
}

message CommonAPIFactoryResetResponse {
}

message CommonAPIWifiScanRequest {
  uint32 max_scan_duration_s                              = 1;
  repeated WifiNetworkSecurityType desired_security_types = 2;
  uint32 maximum_total_aps                                = 3;
}

message CommonAPIWifiScanResponse {
  repeated WifiNetwork wifi_networks = 1;
}

message CommonAPIConfigureWifiRequest {
  bool enabled           = 1;
  WifiConfig wifi_config = 2;
}

message CommonAPIConfigureWifiResponse {
  WifiConfig wifi_config = 1;
  NetworkInterface wifi  = 2;
}

message CommonAPIConfigureWifiWithEncryptedPasswordRequest {
  bool enabled                        = 1;
  WifiConfig wifi_config              = 2;
  EncryptedMessage encrypted_password = 3;
}

message CommonAPIConfigureWifiWithEncryptedPasswordResponse {
  WifiConfig wifi_config = 1;
  NetworkInterface wifi  = 2;
  int32 result           = 3;
}

message CommonAPICheckForUpdateRequest {
}

message CommonAPICheckForUpdateResponse {
}

message CommonAPICheckForUpdateUrgencyRequest {
}

message CommonAPICheckForUpdateUrgencyResponse {
}

message CommonAPIClearUpdateRequest {
}

message CommonAPIClearUpdateResponse {
}

message CommonAPIDeviceCertRequest {
}

message CommonAPIDeviceCertResponse {
  DeviceCertFormat format = 1;
  bytes device_cert       = 2;
}

message CommonAPIGetNetworkingStatusRequest {
}

message CommonAPIGetNetworkingStatusResponse {
  WifiConfig wifi_config = 1;
  NetworkInterface wifi  = 2;
  NetworkInterface eth   = 3;
  NetworkInterface gsm   = 4;
}

message CommonAPIGetCellularInfoRequest {
}

message CommonAPIGetCellularInfoResponse {
  CellularEID eid                   = 1;
  repeated int32 supported_profiles = 2;
}

message CommonAPIConfigureEthernetRequest {
  NetworkInterfaceIPv4Config ipv4_config = 1;
}

message CommonAPIConfigureEthernetResponse {
  NetworkInterface eth = 1;
}

message CommonAPIForgetWifiNetworkRequest {
  string ssid = 1;
}

message CommonAPIForgetWifiNetworkResponse {
}

message CommonAPICheckInternetRequest {
}

message CommonAPICheckInternetResponse {
  NetworkInterface wifi = 1;
  NetworkInterface eth  = 2;
  NetworkInterface gsm  = 3;
}

message CommonAPINegotiateUpdateWithLocallyAvailablePackagesRequest {
  repeated LocallyAvailablePackage locally_available_packages = 1;
}

message CommonAPINegotiateUpdateWithLocallyAvailablePackagesResponse {
  repeated AcceptedPackage accepted_packages = 1;
}

message CommonAPIPerformUpdateFromLocallyAvailablePackagesRequest {
  repeated LocallyAvailablePackage locally_available_packages = 1;
}

message CommonAPIPerformUpdateFromLocallyAvailablePackagesResponse {
  repeated AcceptedPackage accepted_packages = 1;
}

message CommonAPIPrepareRegistrationPayloadRequest {
  bytes customer_registration_info = 1;
}

message CommonAPIPrepareRegistrationPayloadResponse {
  DeviceSignedPayload signed_registration_payload = 1;
}

message CommonMessages {
  ErrorResponse error_response                                                                                             = 1;
  oneof message {
    CommonAPIGetSystemInfoRequest get_system_info_request                                                                  = 2;
    CommonAPIGetSystemInfoResponse get_system_info_response                                                                = 3;
    CommonAPISetLocalSiteConfigRequest set_local_site_config_request                                                       = 4;
    CommonAPISetLocalSiteConfigResponse set_local_site_config_response                                                     = 5;
    CommonAPIPerformUpdateRequest perform_update_request                                                                   = 6;
    CommonAPIPerformUpdateResponse perform_update_response                                                                 = 7;
    CommonAPIFactoryResetRequest factory_reset_request                                                                     = 8;
    CommonAPIFactoryResetResponse factory_reset_response                                                                   = 9;
    CommonAPIWifiScanRequest wifi_scan_request                                                                             = 10;
    CommonAPIWifiScanResponse wifi_scan_response                                                                           = 11;
    CommonAPIConfigureWifiRequest configure_wifi_request                                                                   = 12;
    CommonAPIConfigureWifiResponse configure_wifi_response                                                                 = 13;
    CommonAPICheckForUpdateRequest check_for_update_request                                                                = 14;
    CommonAPICheckForUpdateResponse check_for_update_response                                                              = 15;
    CommonAPIClearUpdateRequest clear_update_request                                                                       = 16;
    CommonAPIClearUpdateResponse clear_update_response                                                                     = 17;
    CommonAPIDeviceCertRequest device_cert_request                                                                         = 18;
    CommonAPIDeviceCertResponse device_cert_response                                                                       = 19;
    CommonAPIConfigureWifiWithEncryptedPasswordRequest configure_wifi_with_encrypted_password_request                      = 20;
    CommonAPIConfigureWifiWithEncryptedPasswordResponse configure_wifi_with_encrypted_password_response                    = 21;
    CommonAPIGetNetworkingStatusRequest get_networking_status_request                                                      = 22;
    CommonAPIGetNetworkingStatusResponse get_networking_status_response                                                    = 23;
    CommonAPIGetCellularInfoRequest get_cellular_info_request                                                              = 24;
    CommonAPIGetCellularInfoResponse get_cellular_info_response                                                            = 25;
    CommonAPIConfigureEthernetRequest configure_ethernet_request                                                           = 26;
    CommonAPIConfigureEthernetResponse configure_ethernet_response                                                         = 27;
    CommonAPIForgetWifiNetworkRequest forget_wifi_network_request                                                          = 28;
    CommonAPIForgetWifiNetworkResponse forget_wifi_network_response                                                        = 29;
    CommonAPICheckInternetRequest check_internet_request                                                                   = 30;
    CommonAPICheckInternetResponse check_internet_response                                                                 = 31;
    CommonAPICheckForUpdateUrgencyRequest check_for_update_urgency_request                                                 = 32;
    CommonAPICheckForUpdateUrgencyResponse check_for_update_urgency_response                                               = 33;
    CommonAPINegotiateUpdateWithLocallyAvailablePackagesRequest negotiate_update_with_locally_available_packages_request   = 34;
    CommonAPINegotiateUpdateWithLocallyAvailablePackagesResponse negotiate_update_with_locally_available_packages_response = 35;
    CommonAPIPrepareRegistrationPayloadRequest prepare_registration_payload_request                                        = 36;
    CommonAPIPrepareRegistrationPayloadResponse prepare_registration_payload_response                                      = 37;
    CommonAPIPerformUpdateFromLocallyAvailablePackagesRequest perform_update_from_locally_available_packages_request       = 38;
    CommonAPIPerformUpdateFromLocallyAvailablePackagesResponse perform_update_from_locally_available_packages_response     = 39;
    //CommonAPIRegisterRequest registration_request                                                                          = 40;
    //CommonAPIRegisterResponse registration_response                                                                        = 41;
    //CommonAPIRetrieveSiteUuidRequest retrieve_site_uuid_request                                                            = 42;
    //CommonAPIRetrieveSiteUuidResponse retrieve_site_uuid_response                                                          = 43;
    //CommonAPIRetrieveSiteSuggestionRequest retrieve_site_suggestion_request                                                = 44;
    //CommonAPIRetrieveSiteSuggestionResponse retrieve_site_suggestion_response                                              = 45;
  }
}
