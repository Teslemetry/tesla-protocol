version: v2
modules:
  - path: proto/command
  - path: proto/telemetry
  - path: proto/energy_device
  - path: proto/energy_command
  - path: proto/teslapower
lint:
  # Tesla's upstream style (package CarServer, enum value SpeedLimit, file-level
  # layout) violates buf's naming rules; we inherit their style, we don't fix it.
  use:
    - MINIMAL
  except:
    - DIRECTORY_SAME_PACKAGE
    - PACKAGE_DIRECTORY_MATCH
breaking:
  use:
    - WIRE_JSON
  # This repo deliberately reserves a field with a reason comment while its
  # payload type isn't yet published, then later un-reserves and models it
  # (see AGENTS.md). That's a wire-compatible addition, not tag reuse, but it
  # trips this rule every time, so it's excepted repo-wide rather than per-PR.
  except:
    - RESERVED_MESSAGE_NO_DELETE
